---
# Conformance test configuration for gRPC-Web protocol
#
# gRPC-Web works over HTTP/1.1 and HTTP/2. Supports all stream types.
# Proto and JSON codecs, identity and gzip compression.

features:
    versions:
        - HTTP_VERSION_1
        - HTTP_VERSION_2
    protocols:
        - PROTOCOL_GRPC_WEB
    codecs:
        - CODEC_PROTO
        - CODEC_JSON
    compressions:
        - COMPRESSION_IDENTITY
        - COMPRESSION_GZIP
        - COMPRESSION_ZSTD
    stream_types:
        - STREAM_TYPE_UNARY
        - STREAM_TYPE_SERVER_STREAM
        - STREAM_TYPE_CLIENT_STREAM
        - STREAM_TYPE_HALF_DUPLEX_BIDI_STREAM
        - STREAM_TYPE_FULL_DUPLEX_BIDI_STREAM
    supports_h2c: true
    supports_tls: false
    supports_tls_client_certs: false
    supports_trailers: true
    supports_connect_get: false
    supports_message_receive_limit: true
    supports_half_duplex_bidi_over_http1: true
