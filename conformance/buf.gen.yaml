---
# Code generation configuration for connectrpc-conformance.
#
# To regenerate the Rust code from upstream protos:
#   task generate:all
#
# Four plugin invocations:
#   - protoc-gen-buffa emits message types (per-file, no mod.rs)
#   - protoc-gen-buffa-packaging emits the buffa tree's mod.rs
#   - protoc-gen-connect-rust emits service stubs (per-file, message types
#     referenced via buffa_module=crate::proto)
#   - protoc-gen-buffa-packaging (again, with filter=services) emits the
#     connect tree's mod.rs for only the service-declaring proto files
version: v2
managed:
    enabled: true
inputs:
    - module: buf.build/connectrpc/conformance
plugins:
    - local: ../../buffa/target/release/protoc-gen-buffa
      out: src/generated/buffa
      opt: [views=true, json=true]
    - local: ../../buffa/target/release/protoc-gen-buffa-packaging
      out: src/generated/buffa
      strategy: all
    - local: ../target/release/protoc-gen-connect-rust
      out: src/generated/connect
      opt: [buffa_module=crate::proto]
    - local: ../../buffa/target/release/protoc-gen-buffa-packaging
      out: src/generated/connect
      strategy: all
      opt: [filter=services]
